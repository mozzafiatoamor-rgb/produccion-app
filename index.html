)&&it.diff!==0&&!ajustado?'<div style="display:flex;gap:6px;margin-top:8px">'+(it.diff<0?'<button class="btn btn-secondary btn-sm" style="flex:1;font-size:11px" onclick="submitAjusteAdmin(\''+turno+'\',\''+it.prod.replace(/'/g,"\\'")+'\','+it.diff+',\'merma\')">\u26a0\ufe0f Merma '+Math.abs(it.diff)+'</button>':'<button class="btn btn-secondary btn-sm" style="flex:1;font-size:11px" onclick="submitAjusteAdmin(\''+turno+'\',\''+it.prod.replace(/'/g,"\\'")+'\','+it.diff+',\'produccion\')">\u{1F3ED} Prod +'+it.diff+'</button>')+'<button class="btn btn-secondary btn-sm" style="font-size:11px;color:var(--text2)" onclick="submitAjusteAdmin(\''+turno+'\',\''+it.prod.replace(/'/g,"\\'")+'\','+it.diff+',\'ignorar\')">\u274c</button></div>':'')+'</div>'}).join('')+'</div></details>'}).join('');if(isAdmin()&&pendientesAjuste===0&&totalDiffs>0){html+='<div style="background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.3);border-radius:10px;padding:12px;margin-top:12px;text-align:center;font-size:13px;color:var(--green)">\u2705 Todas las diferencias han sido ajustadas</div>'}return html}
async function submitAjusteAdmin(turno,prod,diff,tipo){showWorking();var n=now();var cat=S.inventario.find(function(x){return norm(x.producto)===norm(prod)});var catName=cat?cat.categoria:'';var absDiff=Math.abs(diff);if(tipo==='merma'){var id=nextId('AJM',S.mermas);try{await Sheets.append('\u26a0\ufe0f Mermas',[id,n.date,n.time,catName,prod,absDiff,'Ajuste admin cierre '+turno,uName()]);await logAction('Ajuste Admin Merma','Turno '+turno+' | '+prod+' | -'+absDiff+' merma registrada por admin','ajuste_admin',prod+': stock ajustado -'+absDiff);toast('\u26a0\ufe0f Merma de '+absDiff+' registrada para '+prod)}catch(e){toast('Error al registrar merma',1);hideWorking();return}}else if(tipo==='produccion'){var id=nextId('AJP',S.produccion);try{await Sheets.append('\u{1F3ED} Producci\u00f3n',[id,n.date,dayName(),turno,catName,prod,absDiff,uName(),'Ajuste admin cierre']);await logAction('Ajuste Admin Producci\u00f3n','Turno '+turno+' | '+prod+' | +'+absDiff+' producci\u00f3n registrada por admin','ajuste_admin',prod+': stock ajustado +'+absDiff);toast('\u{1F3ED} Producci\u00f3n de +'+absDiff+' registrada para '+prod)}catch(e){toast('Error al registrar producci\u00f3n',1);hideWorking();return}}else{await logAction('Ajuste Ignorado','Turno '+turno+' | '+prod+' | diferencia de '+(diff>0?'+':'')+diff+' ignorada por admin','ajuste_ignorado');toast('\u{1F4DD} Diferencia de '+prod+' ignorada')}var cierre=getCierre(turno);if(cierre){cierre.items=cierre.items.map(function(it){if(norm(it.prod)===norm(prod)){it.ajustado=true;it.ajusteTipo=tipo}return it});await saveCierre(turno,cierre)}await Sheets.loadAll()}
/* ===== ADMIN SUPERVISOR VIEW ===== */
function renderAdminSupervisor(){var selTurno=S.cierreTurno||null;var html='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><span class="card-title" style="margin:0">\u{1F511} Supervisor de Turnos</span><button class="btn btn-secondary btn-sm" onclick="Sheets.loadAll()" style="font-size:11px">\u{1F504} Actualizar</button></div>';html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">';['Ma\u00f1ana','Tarde'].forEach(function(t){var ap=getApertura(t);var pr=getPrecierre(t);var ci=getCierre(t);var phase=determineTurnoPhase(ap,pr,ci);var colors={'none':'var(--text2)','apertura':'var(--blue)','working':'var(--green)','precierre':'var(--yellow)','cierre':'var(--accent)'};var icons={'none':'\u23f3','apertura':'\u{1F4CB}','working':'\u{1F3ED}','precierre':'\u{1F4DD}','cierre':'\u2705'};var labels={'none':'Sin abrir','apertura':'Verificando','working':'Trabajando','precierre':'Conteo','cierre':'Cerrado'};var resp=ap?ap.responsable:'—';var sel=selTurno===t;html+='<div onclick="S.cierreTurno=\''+(sel?'':t)+'\';render()" style="background:var(--surface'+(sel?'3':'2')+');border-radius:12px;padding:14px;cursor:pointer;border:2px solid '+(sel?'var(--accent)':'transparent')+';transition:all .2s"><div style="font-size:24px;margin-bottom:6px">'+icons[phase]+'</div><div style="font-size:15px;font-weight:700;margin-bottom:4px">'+t+'</div><div style="display:inline-block;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:600;background:rgba(255,255,255,.08);color:'+colors[phase]+'">'+labels[phase]+'</div><div style="font-size:11px;color:var(--text2);margin-top:6px">\u{1F464} '+resp+'</div>'+(ap?'<div style="font-size:10px;color:var(--text2)">\u{1F552} '+ap.hora+'</div>':'')+'</div>'});html+='</div>';if(selTurno){html+=renderAdminTurnoDetail(selTurno)}else{html+='<div style="text-align:center;padding:20px;color:var(--text2);font-size:13px">Selecciona un turno para ver detalles y editar</div>'}var turnoLogs=S.bitacora.filter(function(b){return b.accion.indexOf('Turno')!==-1||b.accion.indexOf('Apertura')!==-1||b.accion.indexOf('Cierre')!==-1||b.accion.indexOf('Diferencias')!==-1||b.accion.indexOf('precierre')!==-1||b.accion.indexOf('Pre-cierre')!==-1});html+='<div style="margin-top:16px;border-top:1px solid rgba(255,255,255,.06);padding-top:12px"><div style="font-size:12px;font-weight:600;margin-bottom:8px;color:var(--text2)">\u{1F4DC} Historial de Turnos</div>';if(turnoLogs.length===0){html+='<div style="font-size:12px;color:var(--text2);text-align:center;padding:12px">Sin registros</div>'}else{html+=turnoLogs.slice(0,15).map(function(b){var parts=b.detalle.split(' \u2502 ');var main=parts[0]||'';var isAp=b.accion.indexOf('Apertura')!==-1;var isCi=b.accion.indexOf('Cierre')!==-1;var color=isAp?'var(--green)':isCi?'var(--accent)':'var(--yellow)';return'<div style="background:var(--surface2);border-radius:8px;padding:8px 12px;margin-bottom:6px;border-left:3px solid '+color+'"><div style="display:flex;justify-content:space-between;align-items:center"><div style="font-size:12px;font-weight:700;color:'+color+'">'+b.accion+'</div><div style="font-size:10px;color:var(--text2)">'+b.fecha+' '+b.hora+'</div></div><div style="font-size:11px;margin-top:4px">'+main.substring(0,80)+(main.length>80?'...':'')+'</div><div style="font-size:10px;color:var(--text2);margin-top:2px">\u{1F464} '+b.usuario+'</div></div>'}).join('')}html+='</div>';return html}
function renderAdminTurnoDetail(turno){var apertura=getApertura(turno);var precierre=getPrecierre(turno);var cierre=getCierre(turno);var phase=determineTurnoPhase(apertura,precierre,cierre);var html='<div class="card" style="border:1px solid rgba(255,107,53,.2)">';html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div style="font-size:16px;font-weight:700">\u{1F4CB} Turno '+turno+'</div><span style="font-size:11px;background:var(--surface3);padding:3px 10px;border-radius:6px;color:var(--text2)">'+phase+'</span></div>';html+=renderPhaseIndicator(phase);if(phase==='none'){html+='<div style="text-align:center;padding:16px;color:var(--text2)"><div style="font-size:36px;margin-bottom:8px">\u23f3</div><div style="font-size:13px">El trabajador a\u00fan no ha abierto este turno</div></div>'}if(apertura){var items=Object.values(apertura.snapshot);var totalItems=items.length;var totalStock=items.reduce(function(s,it){return s+it.stock},0);html+='<details style="margin-bottom:10px"'+(phase==='apertura'?' open':'')+'><summary style="background:var(--surface2);border-radius:10px;padding:12px 14px;cursor:pointer;list-style:none;display:flex;justify-content:space-between;align-items:center"><div style="display:flex;align-items:center;gap:8px"><span>\u{1F4F8}</span><span style="font-weight:700">Apertura</span><span style="font-size:11px;color:var(--text2)">'+apertura.hora+' por '+apertura.responsable+'</span></div><div style="display:flex;align-items:center;gap:6px"><span style="font-family:Space Mono;font-weight:700;font-size:12px;color:var(--accent)">'+totalItems+' prod</span>'+(apertura.verified?'<span style="color:var(--green)">\u2705</span>':'<span style="color:var(--yellow)">\u23f3</span>')+'<span style="font-size:12px;color:var(--text2)">\u25BC</span></div></summary><div style="padding:8px 0">';var grouped=groupByCategory(items,'categoria');var cats=Object.keys(grouped).sort();html+=cats.map(function(cat){var catItems=grouped[cat];return'<details style="margin:4px 0"><summary style="padding:6px 10px;font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;list-style:none">\u{1F4C1} '+cat+' ('+catItems.length+')</summary><div>'+catItems.sort(function(a,b){return a.producto.localeCompare(b.producto)}).map(function(it){var cls=it.stock<=0?'color:var(--red)':it.stock<=3?'color:var(--yellow)':'color:var(--green)';return'<div style="display:flex;justify-content:space-between;padding:4px 14px;font-size:12px;border-bottom:1px solid rgba(255,255,255,.03)"><span>'+it.producto+'</span><div style="display:flex;align-items:center;gap:6px"><span style="font-family:Space Mono;font-weight:700;'+cls+'">'+it.stock+'</span><button onclick="event.stopPropagation();openAjusteApertura(\''+turno+'\',\''+it.producto.replace(/'/g,"\\'")+'\')" style="background:rgba(139,92,246,.15);border:none;border-radius:4px;padding:2px 6px;font-size:9px;color:#a78bfa;cursor:pointer">\u270f\ufe0f</button></div></div>'}).join('')+'</div></details>'}).join('');if(!apertura.verified){html+='<button class="btn btn-success btn-sm" style="margin-top:8px;width:100%" onclick="confirmarApertura(\''+turno+'\')">\u2705 Verificar apertura como admin</button>'}html+='</div></details>'}if(phase==='working'||phase==='precierre'||phase==='cierre'){var hoy=today();var prodTurno=S.produccion.filter(function(p){return p.fecha===hoy&&p.turno===turno});var ventHoy=S.ventas.filter(function(v){return v.fecha===hoy});var totalProd=prodTurno.reduce(function(s,p){return s+p.cantidad},0);var totalVent=ventHoy.reduce(function(s,v){return s+v.cantidad},0);html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px"><div style="background:rgba(52,211,153,.1);border-radius:8px;padding:8px;text-align:center"><div style="font-family:Space Mono;font-weight:700;color:var(--green)">+'+totalProd+'</div><div style="font-size:10px;color:var(--text2)">Producci\u00f3n</div></div><div style="background:rgba(248,113,113,.1);border-radius:8px;padding:8px;text-align:center"><div style="font-family:Space Mono;font-weight:700;color:var(--red)">-'+totalVent+'</div><div style="font-size:10px;color:var(--text2)">Ventas</div></div></div>'}if(cierre){html+='<details style="margin-bottom:10px" open><summary style="background:var(--surface2);border-radius:10px;padding:12px 14px;cursor:pointer;list-style:none;display:flex;justify-content:space-between;align-items:center"><div style="display:flex;align-items:center;gap:8px"><span>\u{1F4CA}</span><span style="font-weight:700">Cierre</span><span style="font-size:11px;color:var(--text2)">'+cierre.hora+' por '+(cierre.cerradoPor||cierre.responsable)+'</span></div><div style="display:flex;align-items:center;gap:6px">'+(cierre.diffs.length>0?'<span style="background:rgba(248,113,113,.15);color:var(--red);border-radius:6px;padding:2px 8px;font-size:10px;font-weight:700">'+cierre.diffs.length+' dif</span>':'<span style="color:var(--green)">\u2705</span>')+'<span style="font-size:12px;color:var(--text2)">\u25BC</span></div></summary><div style="padding:8px 0">';cierre.items.forEach(function(it){var color=it.diff===0?'var(--green)':it.diff>0?'var(--yellow)':'var(--red)';var ajustado=it.ajustado||false;html+='<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 14px;font-size:12px;border-bottom:1px solid rgba(255,255,255,.03)'+(it.diff!==0&&!ajustado?';border-left:3px solid '+color:'')+'"><div style="flex:1"><div style="font-weight:600">'+it.prod+'</div><div style="font-size:10px;color:var(--text2)">Sist: '+it.esperado+' \u2192 F\u00eds: '+it.fisico+'</div></div><div style="text-align:right">'+(ajustado?'<span style="font-size:10px;color:var(--green)">\u2705 Ajustado</span>':it.diff===0?'<span style="font-size:10px;color:var(--green)">\u2705</span>':'<span style="font-family:Space Mono;font-weight:700;color:'+color+'">'+(it.diff>0?'+':'')+it.diff+'</span>')+'</div></div>';if(it.diff!==0&&!ajustado){html+='<div style="display:flex;gap:4px;padding:4px 14px;margin-bottom:4px">'+(it.diff<0?'<button class="btn btn-secondary btn-sm" style="flex:1;font-size:10px;padding:6px" onclick="submitAjusteAdmin(\''+turno+'\',\''+it.prod.replace(/'/g,"\\'")+'\','+it.diff+',\'merma\')">\u26a0\ufe0f Merma</button>':'<button class="btn btn-secondary btn-sm" style="flex:1;font-size:10px;padding:6px" onclick="submitAjusteAdmin(\''+turno+'\',\''+it.prod.replace(/'/g,"\\'")+'\','+it.diff+',\'produccion\')">\u{1F3ED} Prod</button>')+'<button class="btn btn-secondary btn-sm" style="font-size:10px;padding:6px;color:var(--text2)" onclick="submitAjusteAdmin(\''+turno+'\',\''+it.prod.replace(/'/g,"\\'")+'\','+it.diff+',\'ignorar\')">\u274c</button></div>'}});html+='</div></details>'}html+='<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;border-top:1px solid rgba(255,255,255,.06);padding-top:12px">';if(precierre&&!cierre){html+='<button class="btn btn-secondary btn-sm" style="flex:1;font-size:11px;color:var(--yellow)" onclick="adminResetPhase(\''+turno+'\',\'precierre\')">\u{1F519} Volver a Trabajando</button>'}if(cierre){html+='<button class="btn btn-secondary btn-sm" style="flex:1;font-size:11px;color:var(--yellow)" onclick="adminResetPhase(\''+turno+'\',\'cierre\')">\u{1F504} Reabrir Turno</button>'}if(apertura){html+='<button class="btn btn-secondary btn-sm" style="flex:1;font-size:11px;color:var(--red)" onclick="adminResetAll(\''+turno+'\')">\u{1F5D1}\ufe0f Resetear</button>'}html+='</div></div>';return html}
async function adminResetPhase(turno,fase){if(!confirm('\u00bfResetear fase '+fase+' del turno '+turno+'?'))return;showWorking();if(fase==='precierre'){await saveTurnoRecord(turno,'precierre',null);toast('Pre-cierre eliminado')}else if(fase==='cierre'){await saveTurnoRecord(turno,'cierre',null);await saveTurnoRecord(turno,'precierre',null);toast('Cierre eliminado, turno reabierto')}await logAction('Admin reset '+fase,'Turno '+turno+' — fase '+fase+' reseteada por admin','admin_reset');hideWorking();render()}
async function adminResetAll(turno){if(!confirm('\u00bfResetear turno '+turno+' completamente?'))return;showWorking();await Promise.allSettled([saveTurnoRecord(turno,'apertura',null),saveTurnoRecord(turno,'precierre',null),saveTurnoRecord(turno,'cierre',null)]);await logAction('Admin reset completo','Turno '+turno+' reseteado completamente por admin','admin_reset');toast('Turno '+turno+' reseteado');hideWorking();render()}
function renderBit(){let d=S.bitacora;if(S.filterDate)d=d.filter(b=>b.fecha===S.filterDate);const q=S.searchQuery.toLowerCase();if(q)d=d.filter(b=>b.accion.toLowerCase().includes(q)||b.detalle.toLowerCase().includes(q)||b.usuario.toLowerCase().includes(q));return`<div style="margin-bottom:14px"><span class="card-title" style="margin:0">\u{1F4DC} Bit\u00e1cora</span></div><div style="display:flex;gap:8px;margin-bottom:10px"><div class="tab-pills" style="flex:1;margin:0"><button class="tab-pill ${S.filterDate===''?'active':''}" onclick="S.filterDate='';render()">Todas</button><button class="tab-pill ${S.filterDate===today()?'active':''}" onclick="S.filterDate=today();render()">Hoy</button></div><input type="date" class="form-input" style="width:140px;padding:7px 10px;font-size:12px" value="${S.filterDate?dateToISO(S.filterDate):''}" onchange="S.filterDate=this.value?isoToDate(this.value):'';render()"></div><div class="search-bar"><span>\u{1F50D}</span><input placeholder="Buscar usuario, acci\u00f3n..." value="${S.searchQuery}" oninput="S.searchQuery=this.value;filterResults()"></div><div id="resultsList">${renderBitList(d)}</div>`}
function renderBitList(f){return!f.length?'<div class="empty-state"><div class="empty-icon">\u{1F4DC}</div><p>Sin registros</p></div>':f.map(b=>{var parts=b.detalle.split(' \u2502 ');var main=parts[0]||'';var stock=parts[1]||'';return`<div class="record-item"><div style="font-size:13px;font-weight:600">${b.accion}</div><div style="font-size:12px;margin:4px 0">${main}</div>${stock?'<div style="font-size:11px;background:var(--surface2);border-radius:6px;padding:6px 10px;margin:6px 0;font-family:Space Mono;color:var(--accent)">\u{1F4E6} '+stock+'</div>':''}<div class="record-meta"><span>\u{1F4C5} ${b.fecha}</span><span>\u{1F552} ${b.hora}</span><span>\u{1F464} ${b.usuario}</span><span class="badge info">${b.tipo}</span></div></div>`}).join('')}

function renderRep(){return`<div class="card-title" style="margin-bottom:14px">\u{1F4CA} Reportes</div><div class="tab-pills"><button class="tab-pill ${S.reportTab==='ventas'?'active':''}" onclick="S.reportTab='ventas';render()">Ventas</button><button class="tab-pill ${S.reportTab==='produccion'?'active':''}" onclick="S.reportTab='produccion';render()">Producci\u00f3n</button><button class="tab-pill ${S.reportTab==='resumen'?'active':''}" onclick="S.reportTab='resumen';render()">Resumen</button></div>${S.reportTab==='ventas'?repV():S.reportTab==='produccion'?repP():repR()}`}
function repV(){if(!S.ventas.length)return'<div class="empty-state"><div class="empty-icon">\u{1F4B0}</div><p>Sin datos</p></div>';const b={};S.ventas.forEach(v=>{if(!b[v.producto])b[v.producto]={c:0,n:0};b[v.producto].c+=v.cantidad;b[v.producto].n++});return`<div class="card"><div class="card-header"><span class="card-title">Top Vendidos</span></div>${Object.entries(b).sort((a,c)=>c[1].c-a[1].c).map(([p,d],i)=>`<div class="report-row"><div><div style="font-size:14px;font-weight:500">${i+1}. ${p}</div><div style="font-size:11px;color:var(--text2)">${d.n} transacciones</div></div><div style="font-family:'Space Mono';font-weight:700;color:var(--blue)">${d.c}</div></div>`).join('')}</div>`}
function repP(){if(!S.produccion.length)return'<div class="empty-state"><div class="empty-icon">\u{1F3ED}</div><p>Sin datos</p></div>';const b={};S.produccion.forEach(p=>{if(!b[p.producto])b[p.producto]={c:0,n:0};b[p.producto].c+=p.cantidad;b[p.producto].n++});return`<div class="card"><div class="card-header"><span class="card-title">Top Producci\u00f3n</span></div>${Object.entries(b).sort((a,c)=>c[1].c-a[1].c).map(([p,d],i)=>`<div class="report-row"><div><div style="font-size:14px;font-weight:500">${i+1}. ${p}</div><div style="font-size:11px;color:var(--text2)">${d.n} lotes</div></div><div style="font-family:'Space Mono';font-weight:700;color:var(--green)">${d.c}</div></div>`).join('')}</div>`}
function repR(){const tp=S.produccion.reduce((s,p)=>s+p.cantidad,0),tv=S.ventas.reduce((s,p)=>s+p.cantidad,0);return`<div class="stats-grid"><div class="stat-box green"><div class="stat-number">${tp}</div><div class="stat-label">Total Producido</div></div><div class="stat-box blue"><div class="stat-number">${tv}</div><div class="stat-label">Total Vendido</div></div><div class="stat-box orange"><div class="stat-number">${S.catalogo.length}</div><div class="stat-label">Productos</div></div><div class="stat-box red"><div class="stat-number">${S.stockBajo.length}</div><div class="stat-label">Stock Bajo</div></div></div><div class="card"><div class="card-header"><span class="card-title">Estado General</span></div><div class="report-row"><span>Registros producci\u00f3n</span><strong>${S.produccion.length}</strong></div><div class="report-row"><span>Registros ventas</span><strong>${S.ventas.length}</strong></div><div class="report-row"><span>Stock bajo</span><strong style="color:var(--red)">${S.stockBajo.length}</strong></div></div>`}

let modalType=null;
function renderModal(){if(!modalType)return'<div class="modal-overlay" id="modal"></div>';let c='';if(modalType==='produccion')c=fmProd();if(modalType==='venta')c=fmVenta();if(modalType==='merma')c=fmMerma();if(modalType==='addProduct')c=fmAddProd();if(modalType==='receta')c=fmReceta();if(modalType==='editReceta')c=fmEditReceta();if(modalType==='settings')c=fmSettings();if(modalType==='userMenu')c=fmUser();return`<div class="modal-overlay active" id="modal" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="modal-handle"></div>${c}</div></div>`}
function openModal(t){if(t==='addProduct'&&!isAdmin()){toast('Solo admin puede agregar productos',1);hideWorking();return}modalType=t;render()}
function closeModal(){modalType=null;render()}

function fmUser(){return`<div class="modal-title">\u{1F464} Mi Cuenta</div><div style="text-align:center;margin-bottom:20px"><div style="width:60px;height:60px;border-radius:16px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;margin:0 auto 12px">${uInit()}</div><div style="font-size:18px;font-weight:700">${uName()}</div><div style="font-size:13px;color:var(--text2);margin-top:4px">@${S.currentUser?.usuario||''}</div><span class="badge ${isAdmin()?'role-admin':'role-user'}" style="margin-top:8px;display:inline-flex">${isAdmin()?'\u{1F511} Administrador':'\u{1F464} Usuario'}</span></div><button class="btn btn-danger" onclick="logout()">\u{1F6AA} Cerrar Sesi\u00f3n</button><div style="height:10px"></div><button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>`}

function fmAddProd(){if(!isAdmin())return'<div class="modal-title">\u{1F512} Acceso denegado</div><p style="color:var(--text2)">Solo admin.</p><button class="btn btn-secondary" onclick="closeModal()">Cerrar</button>';const cats=getCats();return`<div class="modal-title">\u2795 Nuevo Producto</div><div class="form-group"><label class="form-label">Categor\u00eda</label><select class="form-select" id="fNPC"><option value="">Seleccionar...</option>${cats.map(c=>`<option value="${c}">${c}</option>`).join('')}<option value="__new__">\uff0b Crear nueva categor\u00eda...</option></select></div><div id="newCatField" style="display:none"><div class="form-group"><label class="form-label">Nueva Categor\u00eda</label><input class="form-input" id="fNCN" placeholder="Nombre"></div></div><div class="form-group"><label class="form-label">Nombre del Producto</label><input class="form-input" id="fNPN" placeholder="Ej: Ravioles de ricotta" oninput="chkDup()"></div><div id="dupW"></div><div class="form-group"><label class="form-label">Stock M\u00ednimo</label><input class="form-input" id="fNPM" type="number" inputmode="numeric" placeholder="0" min="0"></div><div class="form-group"><label class="form-label">Unidad</label><select class="form-select" id="fNPU"><option value="Porciones">Porciones</option><option value="Unidades">Unidades</option><option value="Kilos">Kilos</option><option value="Litros">Litros</option><option value="Bandejas">Bandejas</option><option value="Paquetes">Paquetes</option></select></div><button class="btn btn-success" onclick="busy(function(){return subNewProd()})">\u2705 Agregar</button><div style="height:10px"></div><button class="btn btn-secondary" onclick="closeModal()">\u2716 Cerrar</button>`}

function updSel(id,cat){const s=document.getElementById(id);const p=getProds(cat);s.innerHTML=p.length?p.map(x=>`<option value="${x.producto}">${x.producto}</option>`).join(''):'<option value="">Sin productos</option>'}

function showStock(){const i=document.getElementById('stockInfo');if(!i)return;const p=document.getElementById('fVP')?.value;if(!p){i.innerHTML='';return}const inv=S.inventario.find(x=>x.producto.trim().toLowerCase()===p.trim().toLowerCase());const st=inv?inv.stockActual:0;if(st<=0)i.innerHTML='<div style="background:rgba(248,113,113,.15);border:1px solid rgba(248,113,113,.3);border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:13px;color:var(--red)">\u{1F6AB} <strong>Stock: 0</strong> \u2014 No se puede vender</div>';else if(inv&&st<=inv.stockMinimo)i.innerHTML=`<div style="background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.3);border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:13px;color:var(--yellow)">\u26a0\ufe0f <strong>Stock: ${st}</strong> \u2014 Bajo</div>`;else i.innerHTML=`<div style="background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.3);border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:13px;color:var(--green)">\u2705 <strong>Stock: ${st}</strong></div>`}

document.addEventListener('change',function(e){if(e.target.id==='fNPC'){const f=document.getElementById('newCatField');if(f)f.style.display=e.target.value==='__new__'?'block':'none'}if(e.target.id==='fRC'){var f=document.getElementById('newRecCatField');if(f)f.style.display=e.target.value==='__new__'?'block':'none'}});

function chkDup(){const n=document.getElementById('fNPN')?.value||'';const w=document.getElementById('dupW');if(!w)return;if(n.length<2){w.innerHTML='';return}const s=S.catalogo.filter(p=>p.producto.toLowerCase().includes(n.toLowerCase()));if(s.length>0)w.innerHTML=`<div class="dup-warning">\u26a0\ufe0f Similares: ${s.map(p=>`<strong>${p.producto}</strong> (${p.categoria})`).join(', ')}</div>`;else w.innerHTML=''}

let _cartProd=[],_cartVenta=[],_cartMerma=[];
function addToCartProd(){const cat=document.getElementById('fPC').value,prod=document.getElementById('fPP').value,qty=document.getElementById('fPQ').value,turno=document.getElementById('fPT').value,notas=document.getElementById('fPN').value;if(!cat||!prod||!qty||parseInt(qty)<1){toast('Completa los campos',1);hideWorking();return}
_cartProd.push({cat,prod,qty:parseInt(qty),turno,notas});toast(prod+' x'+qty+' agregado');document.getElementById('fPP').selectedIndex=0;document.getElementById('fPQ').value='';document.getElementById('fPN').value='';document.getElementById('cartProd').innerHTML=renderCartProd();document.querySelector('#modal .btn-primary').disabled=false;document.querySelector('#modal .btn-primary').innerHTML='\u2705 Guardar Todo ('+_cartProd.length+')'}
function removeCartProd(i){_cartProd.splice(i,1);document.getElementById('cartProd').innerHTML=renderCartProd();const btn=document.querySelector('#modal .btn-primary');btn.disabled=_cartProd.length===0;btn.innerHTML='\u2705 Guardar Todo ('+_cartProd.length+')'}
function renderCartProd(){if(_cartProd.length===0)return'';return'<div class="cart-header"><span class="ch-title">\u{1F4CB} Lista</span><span class="ch-count">'+_cartProd.length+' items</span></div>'+_cartProd.map((c,i)=>'<div class="cart-item"><div class="ci-info"><div class="ci-name">'+c.prod+'</div><div class="ci-meta">'+c.cat+' \u00b7 '+c.turno+(c.notas?' \u00b7 '+c.notas:'')+'</div></div><span class="ci-qty">'+c.qty+'</span><button class="ci-del" onclick="removeCartProd('+i+')">\u2716</button></div>').join('')}
function clearCartProd(){_cartProd=[]}
async function submitCartProd(){showWorking();if(_cartProd.length===0)return;const total=_cartProd.length;const detalle=_cartProd.map(c=>c.qty+' '+c.prod).join(', ');var _sL=_cartProd.map(function(c){var b=getStock(c.prod);return c.prod+': '+b+'\u2192'+(b+c.qty)+' (+'+c.qty+')'}).join(', ');var results=await Promise.allSettled(_cartProd.map(function(c){var id=nextId('P',S.produccion);return Sheets.append('\u{1F3ED} Producci\u00f3n',[id,today(),dayName(),c.turno,c.cat,c.prod,c.qty,uName(),c.notas])}));var ok=results.filter(function(r){return r.status==='fulfilled'}).length;_cartProd=[];await logAction('Producci\u00f3n',detalle,'produccion',_sL);toast(ok+'/'+total+' registros guardados');closeModal();Sheets.loadAll()}
function addToCartVenta(){const cat=document.getElementById('fVC').value,prod=document.getElementById('fVP').value,qty=document.getElementById('fVQ').value,notas=document.getElementById('fVN').value;if(!cat||!prod||!qty||parseInt(qty)<1){toast('Completa los campos',1);hideWorking();return}
const inv=S.inventario.find(p=>p.producto.trim().toLowerCase()===prod.trim().toLowerCase());const st=inv?inv.stockActual:0;const cv=parseInt(qty);const already=_cartVenta.filter(c=>c.prod.trim().toLowerCase()===prod.trim().toLowerCase()).reduce((s,c)=>s+c.qty,0);
if(st<=0){toast('\u274c '+prod+' stock en 0',1);hideWorking();return}if(cv+already>st){toast('\u274c Solo hay '+st+' de '+prod+(already>0?', ya tienes '+already+' en lista':''),1);return}
_cartVenta.push({cat,prod,qty:cv,notas,stock:st});toast(prod+' x'+qty+' agregado');document.getElementById('fVP').selectedIndex=0;document.getElementById('fVQ').value='';document.getElementById('fVN').value='';document.getElementById('stockInfo').innerHTML='';document.getElementById('cartVenta').innerHTML=renderCartVenta();document.querySelector('#modal .btn-primary').disabled=false;document.querySelector('#modal .btn-primary').innerHTML='\u2705 Guardar Todo ('+_cartVenta.length+')'}
function removeCartVenta(i){_cartVenta.splice(i,1);document.getElementById('cartVenta').innerHTML=renderCartVenta();const btn=document.querySelector('#modal .btn-primary');btn.disabled=_cartVenta.length===0;btn.innerHTML='\u2705 Guardar Todo ('+_cartVenta.length+')'}
function renderCartVenta(){if(_cartVenta.length===0)return'';return'<div class="cart-header"><span class="ch-title">\u{1F6D2} Lista de Venta</span><span class="ch-count">'+_cartVenta.length+' items</span></div>'+_cartVenta.map((c,i)=>'<div class="cart-item"><div class="ci-info"><div class="ci-name">'+c.prod+'</div><div class="ci-meta">'+c.cat+(c.notas?' \u00b7 '+c.notas:'')+'</div></div><span class="ci-qty">'+c.qty+'</span><button class="ci-del" onclick="removeCartVenta('+i+')">\u2716</button></div>').join('')}
function clearCartVenta(){_cartVenta=[]}

function fmMerma(){const cats=getCats();return'<div class="modal-title">\u26a0\ufe0f Registrar Merma</div><div style="background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:13px;color:var(--red)">\u{1F464} <strong>'+uName()+'</strong> \u2014 Baja de inventario por merma</div><div class="form-group"><label class="form-label">Categor\u00eda</label><select class="form-select" id="fMC" onchange="updSel(\'fMP\',this.value);showStockMerma()"><option value="">Seleccionar...</option>'+cats.map(function(c){return'<option value="'+c+'">'+c+'</option>'}).join('')+'</select></div><div class="form-group"><label class="form-label">Producto</label><select class="form-select" id="fMP" onchange="showStockMerma()"><option value="">Primero selecciona categor\u00eda</option></select></div><div id="stockInfoMerma"></div><div class="form-group"><label class="form-label">Cantidad a dar de baja</label><input class="form-input" id="fMQ" type="number" inputmode="numeric" placeholder="0" min="1"></div><div class="form-group"><label class="form-label">Motivo de la merma</label><select class="form-select" id="fMM"><option value="Caducidad">Caducidad / Vencimiento</option><option value="Da\u00f1o">Da\u00f1o / Maltrato</option><option value="Sobreproducci\u00f3n">Sobreproducci\u00f3n</option><option value="Devoluci\u00f3n">Devoluci\u00f3n cliente</option><option value="Error producci\u00f3n">Error en producci\u00f3n</option><option value="Contaminaci\u00f3n">Contaminaci\u00f3n</option><option value="Otro">Otro</option></select></div><div class="form-group"><label class="form-label">Detalle / Observaciones</label><textarea class="form-textarea" id="fMN" placeholder="Describe el motivo con m\u00e1s detalle..."></textarea></div><button class="btn btn-secondary" onclick="addToCartMerma()">\u2795 Agregar a lista</button><div id="cartMerma">'+renderCartMerma()+'</div><div class="cart-divider"></div><button class="btn btn-primary" style="background:var(--red)" onclick="busy(function(){return submitCartMerma()})" '+(_cartMerma.length===0?'disabled':'')+' id="btnSaveMerma">\u26a0\ufe0f Registrar Merma ('+_cartMerma.length+')</button><div style="height:10px"></div><button class="btn btn-secondary" onclick="clearCartMerma();closeModal()">\u2716 Cerrar</button>'}
function showStockMerma(){var p=document.getElementById('fMP')?.value;var el=document.getElementById('stockInfoMerma');if(!el)return;if(!p){el.innerHTML='';return}var inv=S.inventario.find(function(x){return x.producto.trim().toLowerCase()===p.trim().toLowerCase()});if(inv){el.innerHTML='<div style="background:var(--surface2);border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:13px">\u{1F4E6} Stock actual: <strong style="color:var(--accent)">'+inv.stockActual+'</strong></div>'}else{el.innerHTML='<div style="background:var(--surface2);border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:13px;color:var(--text2)">Sin inventario</div>'}}
function addToCartMerma(){var cat=document.getElementById('fMC').value,prod=document.getElementById('fMP').value,qty=document.getElementById('fMQ').value,motivo=document.getElementById('fMM').value,notas=document.getElementById('fMN').value;if(!cat||!prod||!qty||parseInt(qty)<1){toast('Completa los campos',1);hideWorking();return}var inv=S.inventario.find(function(x){return x.producto.trim().toLowerCase()===prod.trim().toLowerCase()});var st=inv?inv.stockActual:0;var already=_cartMerma.filter(function(c){return c.prod.trim().toLowerCase()===prod.trim().toLowerCase()}).reduce(function(s,c){return s+c.qty},0);if(parseInt(qty)+already>st){toast('\u274c Solo hay '+st+' de '+prod+(already>0?', ya tienes '+already+' en lista':''),1);return}_cartMerma.push({cat:cat,prod:prod,qty:parseInt(qty),motivo:motivo,notas:notas});toast(prod+' x'+qty+' agregado');document.getElementById('fMP').selectedIndex=0;document.getElementById('fMQ').value='';document.getElementById('fMN').value='';document.getElementById('stockInfoMerma').innerHTML='';document.getElementById('cartMerma').innerHTML=renderCartMerma();var btn=document.getElementById('btnSaveMerma');if(btn){btn.disabled=false;btn.innerHTML='\u26a0\ufe0f Registrar Merma ('+_cartMerma.length+')'}}
function removeCartMerma(i){_cartMerma.splice(i,1);document.getElementById('cartMerma').innerHTML=renderCartMerma();var btn=document.getElementById('btnSaveMerma');if(btn){btn.disabled=_cartMerma.length===0;btn.innerHTML='\u26a0\ufe0f Registrar Merma ('+_cartMerma.length+')'}}
function renderCartMerma(){if(!_cartMerma.length)return'';return'<div class="cart-header"><span class="ch-title" style="color:var(--red)">\u26a0\ufe0f Mermas</span><span class="ch-count">'+_cartMerma.length+' items</span></div>'+_cartMerma.map(function(c,i){return'<div class="cart-item" style="border-left:3px solid var(--red)"><div class="ci-info"><div class="ci-name">'+c.prod+'</div><div class="ci-meta">'+c.motivo+(c.notas?' \u00b7 '+c.notas:'')+'</div></div><span class="ci-qty" style="color:var(--red)">-'+c.qty+'</span><button class="ci-del" onclick="removeCartMerma('+i+')">\u2716</button></div>'}).join('')}
function clearCartMerma(){_cartMerma=[]}
async function submitCartMerma(){showWorking();if(!_cartMerma.length)return;var total=_cartMerma.length;var detalle=_cartMerma.map(function(c){return c.qty+' '+c.prod+' ('+c.motivo+')'}).join(', ');var n=now();var _sLM=_cartMerma.map(function(c){var b=getStock(c.prod);return c.prod+': '+b+'\u2192'+(b-c.qty)+' (-'+c.qty+')'}).join(', ');var results=await Promise.allSettled(_cartMerma.map(function(c){var id=nextId('M',S.mermas);return Sheets.append('\u26a0\ufe0f Mermas',[id,n.date,n.time,c.cat,c.prod,c.qty,c.motivo+(c.notas?' - '+c.notas:''),uName()])}));var ok=results.filter(function(r){return r.status==='fulfilled'}).length;_cartMerma=[];await logAction('Merma',detalle,'merma',_sLM);toast(ok+'/'+total+' mermas registradas');closeModal();Sheets.loadAll()}

var _tpvCart={};
function getPlatillos(){var platillos={};S.recetas.forEach(function(r){if(!platillos[r.platillo])platillos[r.platillo]={nombre:r.platillo,categoria:r.categoria,ingredientes:[]};platillos[r.platillo].ingredientes.push({producto:r.ingrediente,cantidad:r.cantidad,unidad:r.unidad})});return platillos}
function renderVentTPV(){var cats=[...new Set(S.recetas.map(function(r){return r.categoria}))].filter(Boolean).sort();var catF=S.catFilterTPV||'todos';
if(!S.recetas.length)return'<div class="empty-state"><div class="empty-icon">\u{1F37D}\ufe0f</div><p>Sin recetas configuradas</p><p style="font-size:12px;color:var(--text2);margin-top:8px">'+(isAdmin()?'Ve a la pesta\u00f1a Recetas para agregar platillos':'Pide al admin que configure las recetas')+'</p></div>';
return'<div style="background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.3);border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:13px;color:var(--accent)">\u{1F37D}\ufe0f Selecciona platillos vendidos. Se descontar\u00e1 autom\u00e1ticamente de producci\u00f3n.</div><div id="tpvPills" class="tab-pills" style="margin-bottom:8px">'+buildTPVPills(cats,catF)+'</div><div class="search-bar"><span>\u{1F50D}</span><input placeholder="Buscar platillo..." value="'+S.searchQuery+'" oninput="S.searchQuery=this.value;filterTPV()"></div><div id="tpvCart"></div><div id="tpvList"></div>';setTimeout(filterTPV,10)}
function buildTPVPills(cats,catF){return'<button class="tab-pill '+(catF==='todos'?'active':'')+'" onclick="S.catFilterTPV=\'todos\';filterTPV()">Todos</button>'+cats.map(function(c){return'<button class="tab-pill '+(catF===c?'active':'')+'" onclick="S.catFilterTPV=\''+c.replace(/'/g,"\\'")+'\';filterTPV()">'+c+'</button>'}).join('')}
function tpvQty(platillo,delta){if(!_tpvCart[platillo])_tpvCart[platillo]=0;_tpvCart[platillo]=Math.max(0,_tpvCart[platillo]+delta);if(_tpvCart[platillo]===0)delete _tpvCart[platillo];filterTPV()}
function filterTPV(){var el=document.getElementById('tpvList');if(!el){render();return}var platillos=getPlatillos();var keys=Object.keys(platillos).sort();var q=S.searchQuery.toLowerCase();if(q)keys=keys.filter(function(k){return k.toLowerCase().includes(q)||platillos[k].categoria.toLowerCase().includes(q)});var catF=S.catFilterTPV||'todos';if(catF!=='todos')keys=keys.filter(function(k){return platillos[k].categoria===catF});var cats=[...new Set(S.recetas.map(function(r){return r.categoria}))].filter(Boolean).sort();var pillsEl=document.getElementById('tpvPills');if(pillsEl)pillsEl.innerHTML=buildTPVPills(cats,catF);var cartEl=document.getElementById('tpvCart');if(cartEl)cartEl.innerHTML=buildTPVCart(platillos);el.innerHTML=keys.map(function(k){var p=platillos[k];var qty=_tpvCart[k]||0;return'<div style="background:'+(qty>0?'rgba(52,211,153,.08)':'var(--surface2)')+';border-radius:12px;padding:12px;margin-bottom:8px;transition:all .2s"><div style="display:flex;align-items:center;gap:10px"><div style="flex:1"><div style="font-size:14px;font-weight:700">'+(qty>0?'\u2705 ':'')+k+'</div><div style="font-size:11px;color:var(--text2)">'+p.ingredientes.map(function(i){return i.cantidad+' '+i.producto}).join(', ')+'</div></div><div style="display:flex;align-items:center;gap:6px"><button onclick="tpvQty(\''+k.replace(/'/g,"\\'")+'\',-1)" style="width:34px;height:34px;border-radius:8px;border:1px solid '+(qty>0?'var(--red)':'var(--surface3)')+';background:'+(qty>0?'rgba(248,113,113,.15)':'var(--surface)')+';color:'+(qty>0?'var(--red)':'var(--text)')+';font-size:18px;cursor:pointer">\u2212</button><span style="font-family:Space Mono;font-weight:700;font-size:18px;min-width:28px;text-align:center;color:'+(qty>0?'var(--green)':'var(--text2)')+'">'+qty+'</span><button onclick="tpvQty(\''+k.replace(/'/g,"\\'")+'\',1)" style="width:34px;height:34px;border-radius:8px;border:1px solid var(--accent);background:var(--accent);color:#fff;font-size:18px;cursor:pointer">+</button></div></div></div>'}).join('')}
function buildTPVCart(platillos){var entries=Object.entries(_tpvCart).filter(function(e){return e[1]>0});if(!entries.length)return'';var totalItems=entries.reduce(function(s,e){return s+e[1]},0);var descuentos={};entries.forEach(function(e){var p=platillos[e[0]];if(!p)return;p.ingredientes.forEach(function(ing){if(!descuentos[ing.producto])descuentos[ing.producto]=0;descuentos[ing.producto]+=ing.cantidad*e[1]})});var descList=Object.entries(descuentos);return'<div style="background:var(--surface2);border-radius:12px;padding:14px;margin-bottom:12px;border:1px solid rgba(52,211,153,.3)"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><span style="font-size:14px;font-weight:700">\u{1F6D2} Carrito ('+totalItems+')</span><button onclick="_tpvCart={};filterTPV()" style="background:none;border:none;color:var(--red);font-size:12px;cursor:pointer">\u{1F5D1}\ufe0f Vaciar</button></div>'+entries.map(function(e){return'<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04)"><div style="flex:1;font-size:13px">'+e[0]+'</div><div style="display:flex;align-items:center;gap:6px"><button onclick="tpvQty(\''+e[0].replace(/'/g,"\\'")+'\',-1)" style="width:24px;height:24px;border-radius:6px;border:1px solid var(--surface3);background:var(--surface);color:var(--text);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center">\u2212</button><span style="font-family:Space Mono;font-weight:700;font-size:14px;min-width:20px;text-align:center;color:var(--green)">'+e[1]+'</span><button onclick="tpvQty(\''+e[0].replace(/'/g,"\\'")+'\',1)" style="width:24px;height:24px;border-radius:6px;border:1px solid var(--accent);background:var(--accent);color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center">+</button></div></div>'}).join('')+'<div style="margin-top:10px;padding-top:8px;border-top:1px solid rgba(255,255,255,.08)"><div style="font-size:11px;color:var(--text2);margin-bottom:6px">\u{1F4E6} Se descontar\u00e1 de producci\u00f3n:</div>'+descList.map(function(d){return'<span style="display:inline-block;background:rgba(251,191,36,.1);color:var(--yellow);border-radius:6px;padding:3px 8px;font-size:11px;margin:2px 4px 2px 0">'+Math.ceil(d[1])+' '+d[0]+'</span>'}).join('')+'</div><button class="btn btn-success" onclick="busy(function(){return submitTPV()})" style="width:100%;margin-top:12px;padding:14px;font-size:15px;border-radius:12px;box-shadow:0 4px 20px rgba(52,211,153,.4)">\u2705 Registrar '+totalItems+' Platillo'+(totalItems>1?'s':'')+' Vendidos</button></div>'}
function filterRecetas(){var el=document.getElementById('recetasList');if(!el){render();return}var platillos=getPlatillos();var keys=Object.keys(platillos).sort();var q=S.searchQuery.toLowerCase();if(q)keys=keys.filter(function(k){return k.toLowerCase().includes(q)});el.innerHTML=keys.length===0?'<div class="empty-state"><div class="empty-icon">\u{1F4D6}</div><p>Sin recetas</p></div>':keys.map(function(k){var p=platillos[k];return'<div class="card" style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div><div style="font-size:15px;font-weight:700">\u{1F37D}\ufe0f '+k+'</div><div style="font-size:11px;color:var(--text2)">'+p.categoria+'</div></div>'+(isAdmin()?'<div style="display:flex;gap:6px"><button class="btn btn-sm" style="padding:6px 10px;font-size:11px" onclick="editReceta(\''+k.replace(/'/g,"\\'")+'\')">✏\ufe0f</button><button class="btn btn-sm" style="padding:6px 10px;font-size:11px;color:var(--red)" onclick="deleteReceta(\''+k.replace(/'/g,"\\'")+'\')">🗑\ufe0f</button></div>':'')+'</div>'+p.ingredientes.map(function(i){return'<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px"><span>\u{1F4E6} '+i.producto+'</span><span style="font-family:Space Mono;font-weight:600;color:var(--accent)">'+i.cantidad+(i.unidad?' '+i.unidad:'')+'</span></div>'}).join('')+'</div>'}).join('')}
async function submitTPV(){showWorking();var platillos=getPlatillos();var entries=Object.entries(_tpvCart).filter(function(e){return e[1]>0});if(!entries.length)return;var n=now();var detalles=[];var descuentos=[];var ventaPromises=[];entries.forEach(function(e){var nombre=e[0];var qty=e[1];var p=platillos[nombre];if(!p)return;var id=nextId('V',S.ventas);ventaPromises.push(Sheets.append('\u{1F4B0} Ventas',[id,n.date,'TPV',nombre,qty,uName(),'[TPV]']));detalles.push(qty+'x '+nombre);p.ingredientes.forEach(function(ing){descuentos.push({prod:ing.producto,qty:ing.cantidad*qty})})});var ventaResults=await Promise.allSettled(ventaPromises);var ok=ventaResults.filter(function(r){return r.status==='fulfilled'}).length;var descGrouped={};descuentos.forEach(function(d){var key=norm(d.prod);if(!descGrouped[key])descGrouped[key]={prod:d.prod,qty:0};descGrouped[key].qty+=d.qty});var descList=Object.values(descGrouped);await Promise.allSettled(descList.map(function(d){var id2=nextId('V',S.ventas);var catMatch=findCat(d.prod);var catName=catMatch?catMatch.categoria:'';var prodName=catMatch?catMatch.producto:d.prod;return Sheets.append('\u{1F4B0} Ventas',[id2,n.date,catName,prodName,Math.ceil(d.qty),uName(),'Descuento TPV'])}));if(ok>0){var _sLT=descList.map(function(d){var cm=findCat(d.prod);var pn=cm?cm.producto:d.prod;var b=getStock(pn);var q=Math.ceil(d.qty);return pn+': '+b+'\u2192'+(b-q)+' (-'+q+')'}).join(', ');await logAction('Venta TPV',detalles.join(', ')+' \u2192 Descuento: '+descList.map(function(d){return Math.ceil(d.qty)+' '+d.prod}).join(', '),'venta',_sLT);toast('\u2705 '+ok+' platillo'+(ok>1?'s':'')+' registrados');_tpvCart={};Sheets.loadAll()}}

function fmReceta(){var cats=[...new Set(S.recetas.map(function(r){return r.categoria}))].filter(Boolean).sort();return'<div class="modal-title">\u2795 Nueva Receta</div><div class="form-group"><label class="form-label">Categor\u00eda (para todos los platillos)</label><select class="form-select" id="fRC"><option value="">Seleccionar...</option>'+cats.map(function(c){return'<option value="'+c+'">'+c+'</option>'}).join('')+'<option value="__new__">\uff0b Nueva...</option></select></div><div id="newRecCatField" style="display:none"><div class="form-group"><label class="form-label">Nueva Categor\u00eda</label><input class="form-input" id="fRCN" placeholder="Ej: Chapatas"></div></div><div style="background:var(--surface2);border-radius:10px;padding:12px;margin-bottom:12px"><div style="font-size:13px;font-weight:700;margin-bottom:8px">\u{1F37D}\ufe0f Armar Platillo</div><div class="form-group"><label class="form-label" style="font-size:12px">Nombre del Platillo</label><input class="form-input" id="fRN" placeholder="Ej: Chapata de Pollo" style="font-size:13px"></div><div style="font-size:12px;color:var(--text2);margin-bottom:6px">\u{1F4E6} Ingredientes:</div><div style="display:flex;gap:6px;margin-bottom:8px"><div style="flex:2;position:relative"><input class="form-input" id="fRI" placeholder="Escribir ingrediente..." autocomplete="off" oninput="filterIngSearch(this.value)" onfocus="filterIngSearch(this.value)" style="padding:8px;font-size:12px"><div id="fRISuggest" style="display:none;position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1px solid var(--surface3);border-radius:8px;max-height:180px;overflow-y:auto;z-index:200;margin-top:2px"></div></div><input class="form-input" id="fRIQ" type="number" inputmode="decimal" placeholder="Cant" min="0.1" step="0.1" style="flex:1;padding:8px;font-size:12px"><button class="btn btn-sm" onclick="addRecIng()" style="padding:8px 12px">\u2795</button></div><div id="recIngList">'+renderRecIng()+'</div><button class="btn btn-accent" onclick="addPlatilloToCart()" style="width:100%;margin-top:8px;padding:10px">\u{1F37D}\ufe0f Agregar Platillo al Carrito</button></div><div id="recetaCartList">'+renderRecetaCart()+'</div><button class="btn btn-success" onclick="busy(function(){return submitRecetaCart()})" style="width:100%" '+(_recetaCart.length===0?'disabled':'')+' id="btnSaveRecCart">\u2705 Guardar '+_recetaCart.length+' Receta'+(_recetaCart.length!==1?'s':'')+'</button><div style="height:10px"></div><button class="btn btn-secondary" onclick="_recetaIngredientes=[];_recetaCart=[];closeModal()" style="width:100%">\u2716 Cerrar</button>'}

function fmEditReceta(){var platillos=getPlatillos();var p=platillos[_editRecetaNombre];if(!p)return'<div class="modal-title">Error</div>';var cats=[...new Set(S.recetas.map(function(r){return r.categoria}))].filter(Boolean).sort();_recetaIngredientes=p.ingredientes.map(function(i){return{producto:i.producto,cantidad:i.cantidad}});return'<div class="modal-title">\u270f\ufe0f Editar: '+_editRecetaNombre+'</div><div class="form-group"><label class="form-label">Nombre del Platillo</label><input class="form-input" id="fRN" value="'+_editRecetaNombre+'"></div><div class="form-group"><label class="form-label">Categor\u00eda</label><select class="form-select" id="fRC"><option value="">Seleccionar...</option>'+cats.map(function(c){return'<option value="'+c+'"'+(c===p.categoria?' selected':'')+'>'+c+'</option>'}).join('')+'<option value="__new__">\uff0b Nueva...</option></select></div><div id="newRecCatField" style="display:none"><div class="form-group"><label class="form-label">Nueva Categor\u00eda</label><input class="form-input" id="fRCN"></div></div><div style="background:var(--surface2);border-radius:10px;padding:12px;margin-bottom:12px"><div style="font-size:13px;font-weight:700;margin-bottom:8px">\u{1F4E6} Ingredientes</div><div style="display:flex;gap:6px;margin-bottom:8px"><div style="flex:2;position:relative"><input class="form-input" id="fRI" placeholder="Escribir ingrediente..." autocomplete="off" oninput="filterIngSearch(this.value)" onfocus="filterIngSearch(this.value)" style="padding:8px;font-size:12px"><div id="fRISuggest" style="display:none;position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1px solid var(--surface3);border-radius:8px;max-height:180px;overflow-y:auto;z-index:200;margin-top:2px"></div></div><input class="form-input" id="fRIQ" type="number" inputmode="decimal" placeholder="Cant" min="0.1" step="0.1" style="flex:1;padding:8px;font-size:12px"><button class="btn btn-sm" onclick="addRecIng()" style="padding:8px 12px">\u2795</button></div><div id="recIngList">'+renderRecIng()+'</div></div><button class="btn btn-success" onclick="busy(function(){return submitEditReceta()})" style="width:100%">\u2705 Guardar Cambios</button><div style="height:10px"></div><button class="btn btn-secondary" onclick="clearRecEdit()" style="width:100%">\u2716 Cerrar</button>'}

function addRecIng(){var prod=document.getElementById('fRI')?.value?.trim();var qty=parseFloat(document.getElementById('fRIQ')?.value)||0;if(!prod||qty<=0){toast('Escribe ingrediente y cantidad',1);hideWorking();return}var match=S.catalogo.find(function(p){return norm(p.producto)===norm(prod)});if(!match){toast('Producto no encontrado en cat\u00e1logo',1);hideWorking();return}var dup=_recetaIngredientes.find(function(i){return i.producto===match.producto});if(dup){dup.cantidad+=qty}else{_recetaIngredientes.push({producto:match.producto,cantidad:qty})}document.getElementById('fRI').value='';document.getElementById('fRIQ').value='';document.getElementById('fRISuggest').style.display='none';document.getElementById('recIngList').innerHTML=renderRecIng()}

function filterIngSearch(val){var el=document.getElementById('fRISuggest');if(!el)return;var v=val.trim().toLowerCase();if(v.length<1){el.style.display='none';return}var matches=S.catalogo.filter(function(p){return p.producto.toLowerCase().includes(v)}).slice(0,15);if(!matches.length){el.style.display='none';return}el.style.display='block';el.innerHTML=matches.map(function(p){var safe=p.producto.replace(/'/g,"\\'");return'<div onpointerdown="event.preventDefault()" onclick="selectIng(\''+safe+'\')" style="padding:10px 12px;font-size:13px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.04)"><strong>'+p.producto+'</strong> <span style="color:var(--text2);font-size:11px">'+p.categoria+'</span></div>'}).join('')}
function selectIng(prod){document.getElementById('fRI').value=prod;document.getElementById('fRISuggest').style.display='none';document.getElementById('fRIQ').focus()}

function removeRecIng(idx){_recetaIngredientes.splice(idx,1);document.getElementById('recIngList').innerHTML=renderRecIng()}
function renderRecIng(){if(!_recetaIngredientes.length)return'<div style="font-size:12px;color:var(--text2);text-align:center;padding:8px">Agrega ingredientes</div>';return _recetaIngredientes.map(function(i,idx){return'<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04)"><span style="flex:1;font-size:13px">'+i.producto+'</span><span style="font-family:Space Mono;font-weight:600;font-size:13px;color:var(--accent)">'+i.cantidad+'</span><button onclick="removeRecIng('+idx+')" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:14px">\u2716</button></div>'}).join('')}
function addPlatilloToCart(){var nombre=document.getElementById('fRN')?.value?.trim();if(!nombre){toast('Escribe el nombre del platillo',1);hideWorking();return}if(!_recetaIngredientes.length){toast('Agrega ingredientes',1);hideWorking();return}var dup=_recetaCart.find(function(r){return r.nombre.toLowerCase()===nombre.toLowerCase()});if(dup){toast('Ya est\u00e1 en el carrito',1);hideWorking();return}_recetaCart.push({nombre:nombre,ingredientes:_recetaIngredientes.slice()});_recetaIngredientes=[];document.getElementById('fRN').value='';document.getElementById('fRI').value='';document.getElementById('fRIQ').value='';document.getElementById('recIngList').innerHTML=renderRecIng();document.getElementById('recetaCartList').innerHTML=renderRecetaCart();var btn=document.getElementById('btnSaveRecCart');if(btn){btn.disabled=false;btn.textContent='\u2705 Guardar '+_recetaCart.length+' Receta'+(_recetaCart.length!==1?'s':'')}toast('\u{1F37D}\ufe0f '+nombre+' agregado al carrito')}

async function submitRecetaCart(){showWorking();var cat=document.getElementById('fRC')?.value;var nc=document.getElementById('fRCN')?.value?.trim()||'';if(cat==='__new__'){if(!nc){toast('Escribe categor\u00eda',1);hideWorking();return}cat=nc}if(!cat){toast('Selecciona categor\u00eda',1);hideWorking();return}if(!_recetaCart.length){toast('Agrega al menos un platillo',1);hideWorking();return}var allAppends=[];var nombres=[];_recetaCart.forEach(function(r){r.ingredientes.forEach(function(i){allAppends.push(Sheets.append('\u{1F37D}\ufe0f Recetas',[r.nombre,cat,i.producto,i.cantidad,'']))});nombres.push(r.nombre)});var results=await Promise.allSettled(allAppends);var ok=results.filter(function(r){return r.status==='fulfilled'}).length;if(ok>0){await logAction('Recetas creadas ('+nombres.length+')',nombres.join(', '),'receta');toast('\u2705 '+nombres.length+' receta'+(nombres.length>1?'s':'')+' guardada'+(nombres.length>1?'s':''));_recetaIngredientes=[];_recetaCart=[];closeModal();Sheets.loadAll()}}

async function deleteReceta(nombre){showWorking();if(!confirm('\u00bfEliminar receta "'+nombre+'"?'))return;var rows=[];S.recetas.forEach(function(r,i){if(r.platillo===nombre)rows.push(i)});await Promise.allSettled(rows.reverse().map(function(idx){return Sheets.deleteRow('\u{1F37D}\ufe0f Recetas',idx+2)}));await logAction('Receta eliminada',nombre,'receta');toast('Receta eliminada');Sheets.loadAll()}
async function submitCartVenta(){showWorking();if(_cartVenta.length===0)return;const total=_cartVenta.length;const detalle=_cartVenta.map(c=>c.qty+' '+c.prod).join(', ');var _sLV=_cartVenta.map(function(c){var b=getStock(c.prod);return c.prod+': '+b+'\u2192'+(b-c.qty)+' (-'+c.qty+')'}).join(', ');var results=await Promise.allSettled(_cartVenta.map(function(c){var id=nextId('V',S.ventas);return Sheets.append('\u{1F4B0} Ventas',[id,today(),c.cat,c.prod,c.qty,uName(),c.notas])}));var ok=results.filter(function(r){return r.status==='fulfilled'}).length;_cartVenta=[];await logAction('Venta',detalle,'venta',_sLV);toast(ok+'/'+total+' ventas guardadas');closeModal();Sheets.loadAll()}

async function subNewProd(){showWorking();if(!isAdmin()){toast('Sin permisos',1);hideWorking();return}let cat=document.getElementById('fNPC').value;const nc=document.getElementById('fNCN')?.value?.trim()||'';const nm=document.getElementById('fNPN').value.trim();const mn=document.getElementById('fNPM').value||'0';const un=document.getElementById('fNPU').value;if(cat==='__new__'){if(!nc){toast('Escribe la categor\u00eda',1);hideWorking();return}cat=nc}if(!cat||!nm){toast('Completa categor\u00eda y nombre',1);hideWorking();return}if(isDup(nm,cat)){toast('Producto ya existe',1);hideWorking();return}const id=nextId('PROD',S.catalogo);try{await Sheets.append('\u{1F4E6} Cat\u00e1logo',[id,cat,nm,parseInt(mn),un,'SI']);await logAction('Producto agregado',nm+' en '+cat,'add');toast(nm+' agregado');document.getElementById('fNPN').value='';document.getElementById('fNPM').value='';document.getElementById('dupW').innerHTML='';await Sheets.loadAll();const cs=document.getElementById('fNPC');if(cs){const cats=getCats();cs.innerHTML='<option value="">Seleccionar...</option>'+cats.map(c=>`<option value="${c}">${c}</option>`).join('')+'<option value="__new__">\uff0b Nueva categor\u00eda...</option>';cs.value=cat}}catch(e){toast('Error al guardar',1)}}

function saveSett(){S.sheetId=document.getElementById('sS').value;S.apiKey=document.getElementById('sA').value;localStorage.setItem('sheetId',S.sheetId);localStorage.setItem('apiKey',S.apiKey);toast('Guardado');closeModal();Sheets.loadAll()}
function resetApp(){localStorage.clear();S.sheetId='';S.apiKey='';S.screen='setup';S.setupStep=1;S.connected=false;S.currentUser=null;closeModal();render()}

(async function(){if(S.sheetId&&S.apiKey){const su=localStorage.getItem('currentUser');if(su){try{S.currentUser=JSON.parse(su);S.screen='main';S.connected=true;render();await Sheets.loadUsers();const ok=S.usuarios.find(u=>u.usuario===S.currentUser.usuario);if(!ok){toast('Cuenta deshabilitada',1);logout();return}await Sheets.loadAll()}catch(e){S.screen='login';render()}}else{S.screen='login';S.connected=true;await Sheets.loadUsers();render()}}else{render()}})();
</script>
